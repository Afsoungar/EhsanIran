allow-lan: true
interface-name: utun
log-level: info
mixed-port: 7890
mode: Rule
proxies:
- name: 185.239.1.63:3129
  port: 3129
  server: 185.239.1.63
  type: http
  udp: true
- name: 31.25.92.114:8080
  port: 8080
  server: 31.25.92.114
  type: http
  udp: true
- name: 217.219.74.130:17
  port: 17
  server: 217.219.74.130
  type: http
  udp: true
- name: 217.219.121.66:58224
  port: 58224
  server: 217.219.121.66
  type: http
  udp: true
- name: 151.232.72.12:80
  port: 80
  server: 151.232.72.12
  type: http
  udp: true
- name: 151.232.72.16:80
  port: 80
  server: 151.232.72.16
  type: http
  udp: true
- name: 45.82.139.181:80
  port: 80
  server: 45.82.139.181
  type: http
  udp: true
proxy-groups:
- name: MAIN
  proxies:
  - IR-AUTO
  - IR-BALANCE
  - IR-ALL
  - IR-ALL-RAW
  type: select
- name: IR-ALL
  proxies:
  - DIRECT
  type: select
- name: IR-ALL-RAW
  proxies: &id001
  - 185.239.1.63:3129
  - 31.25.92.114:8080
  - 217.219.74.130:17
  - 217.219.121.66:58224
  - 151.232.72.12:80
  - 151.232.72.16:80
  - 45.82.139.181:80
  type: select
- interval: 600
  name: IR-AUTO
  proxies: *id001
  timeout: 60000
  type: fallback
  url: https://google.com
- interval: 600
  name: IR-BALANCE
  proxies: *id001
  strategy: round-robin
  timeout: 60000
  type: load-balance
  url: https://google.com
rules:
- MATCH,MAIN
tun:
  dns-hijack:
  - any:53
  enable: true
  stack: system
