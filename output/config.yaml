allow-lan: true
interface-name: utun
log-level: info
mixed-port: 7890
mode: Rule
proxies:
- name: 151.232.72.18:80
  port: 80
  server: 151.232.72.18
  type: http
  udp: true
- name: 151.232.72.20:80
  port: 80
  server: 151.232.72.20
  type: http
  udp: true
- name: 31.217.214.131:8090
  port: 8090
  server: 31.217.214.131
  type: http
  udp: true
proxy-groups:
- name: MAIN
  proxies:
  - IR-AUTO
  - IR-BALANCE
  - IR-ALL
  - IR-ALL-RAW
  type: select
- name: IR-ALL
  proxies:
  - DIRECT
  type: select
- name: IR-ALL-RAW
  proxies: &id001
  - 151.232.72.18:80
  - 151.232.72.20:80
  - 31.217.214.131:8090
  type: select
- interval: 600
  name: IR-AUTO
  proxies: *id001
  timeout: 60000
  type: fallback
  url: https://google.com
- interval: 600
  name: IR-BALANCE
  proxies: *id001
  strategy: round-robin
  timeout: 60000
  type: load-balance
  url: https://google.com
rules:
- MATCH,MAIN
tun:
  dns-hijack:
  - any:53
  enable: true
  stack: system
