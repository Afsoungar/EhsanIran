allow-lan: true
interface-name: utun
log-level: info
mixed-port: 7890
mode: Rule
proxies:
- name: 185.53.142.171:20000 (171ms)
  port: 20000
  server: 185.53.142.171
  type: http
  udp: true
- name: 217.219.162.114:5678
  port: 5678
  server: 217.219.162.114
  type: http
  udp: true
- name: 93.118.135.176:1081
  port: 1081
  server: 93.118.135.176
  type: http
  udp: true
- name: 5.160.103.246:8080 (178ms)
  port: 8080
  server: 5.160.103.246
  type: socks5
  udp: true
- name: 185.46.218.196:5678
  port: 5678
  server: 185.46.218.196
  type: socks5
  udp: true
proxy-groups:
- name: MAIN
  proxies:
  - IR-AUTO
  - IR-BALANCE
  - IR-ALL
  - IR-ALL-RAW
  type: select
- name: IR-ALL
  proxies:
  - 185.53.142.171:20000 (171ms)
  - 5.160.103.246:8080 (178ms)
  type: select
- name: IR-ALL-RAW
  proxies: &id001
  - 185.53.142.171:20000 (171ms)
  - 217.219.162.114:5678
  - 93.118.135.176:1081
  - 5.160.103.246:8080 (178ms)
  - 185.46.218.196:5678
  type: select
- interval: 600
  name: IR-AUTO
  proxies: *id001
  timeout: 60000
  type: fallback
  url: https://google.com
- interval: 600
  name: IR-BALANCE
  proxies: *id001
  strategy: round-robin
  timeout: 60000
  type: load-balance
  url: https://google.com
rules:
- MATCH,MAIN
tun:
  dns-hijack:
  - any:53
  enable: true
  stack: system
