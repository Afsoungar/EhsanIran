allow-lan: true
interface-name: utun
log-level: info
mixed-port: 7890
mode: Rule
proxies:
- name: 188.136.162.30:4153
  port: 4153
  server: 188.136.162.30
  type: socks5
  udp: true
- name: 178.22.121.196:1080
  port: 1080
  server: 178.22.121.196
  type: socks5
  udp: true
- alterId: 0
  cipher: auto
  name: 185.24.255.24:80
  network: ws
  port: 80
  server: 185.24.255.24
  tls: false
  type: vmess
  udp: true
  uuid: 80abb903-24e0-4dbd-9c2f-a57e9a267555
  ws-opts:
    headers:
      Host: ''
    path: /ws
proxy-groups:
- name: MAIN
  proxies:
  - IR-AUTO
  - IR-BALANCE
  - IR-ALL
  - IR-ALL-RAW
  type: select
- name: IR-ALL
  proxies:
  - DIRECT
  type: select
- name: IR-ALL-RAW
  proxies: &id001
  - 188.136.162.30:4153
  - 178.22.121.196:1080
  - 185.24.255.24:80
  type: select
- interval: 600
  name: IR-AUTO
  proxies: *id001
  timeout: 60000
  type: fallback
  url: https://google.com
- interval: 600
  name: IR-BALANCE
  proxies: *id001
  strategy: round-robin
  timeout: 60000
  type: load-balance
  url: https://google.com
rules:
- MATCH,MAIN
tun:
  dns-hijack:
  - any:53
  enable: true
  stack: system
